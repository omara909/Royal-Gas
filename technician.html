<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مهام الفني - Royal Gas</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap');
        :root { --main: #0b4a99; --accent: #ce2029; --success: #28a745; --warning: #ff9800; --bg: #f4f7f6; }
        * { box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding: 15px; padding-bottom: 50px; }
        
        .header { background: var(--main); color: white; padding: 25px 20px; border-radius: 0 0 25px 25px; margin: -15px -15px 20px -15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header h2 { margin: 0; font-weight: 800; font-size: 20px; }
        
        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 15px; border-radius: 18px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-bottom: 4px solid #ddd; }
        .stat-card.pending { border-bottom-color: var(--accent); }
        .stat-card.completed { border-bottom-color: var(--success); }
        .stat-card small { color: #777; font-weight: 600; display: block; margin-bottom: 5px; }
        .stat-card span { font-size: 24px; font-weight: 800; color: var(--main); }

        .task-card { background: white; border-radius: 18px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-right: 8px solid var(--accent); position: relative; }
        .client-name { color: var(--main); font-size: 19px; font-weight: 800; margin: 0 0 15px 0; display: block; }
        .info-item { margin-bottom: 12px; display: flex; align-items: flex-start; font-size: 15px; }
        .info-item b { min-width: 85px; color: #666; font-weight: 600; }
        
        .actions-area { margin-top: 20px; border-top: 1px dashed #ddd; padding-top: 15px; }
        .btn { display: flex; align-items: center; justify-content: center; padding: 12px; border-radius: 12px; font-weight: 700; text-decoration: none; border: none; cursor: pointer; transition: 0.2s; font-size: 14px; width: 100%; margin-bottom: 10px; }
        
        .btn-call { background: #e3f2fd; color: var(--main); }
        .btn-upload { background: #f5f5f5; color: #444; border: 2px dashed #ccc; }
        .btn-done { background: var(--success); color: white; box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3); }
        .btn-delay { background: var(--warning); color: white; }
        .btn-cancel { background: #eee; color: var(--accent); }

        .delay-box { display: none; background: #fff8e1; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #ffe082; }
        .delay-box input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; }

        .upload-input { display: none; }
        .loader { display: none; font-size: 14px; color: var(--main); text-align: center; font-weight: bold; margin: 10px 0; }
        .gps-notice { font-size: 11px; color: #888; text-align: center; margin-top: 5px; }
        .logout-btn { background: none; border: 1px solid white; color: white; padding: 5px 10px; border-radius: 8px; font-size: 12px; float: left; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <button class="logout-btn" id="logoutBtn">خروج</button>
        <h2>📋 لوحة تحكم الفني</h2>
        <p id="techEmail" style="font-size: 13px; opacity: 0.8; margin-top: 8px;"></p>
    </div>

    <div class="stats-container">
        <div class="stat-card pending">
            <small>مهام متبقية</small>
            <span id="pendingCount">0</span>
        </div>
        <div class="stat-card completed">
            <small>تم إنجازها</small>
            <span id="doneCount">0</span>
        </div>
    </div>

    <div id="tasksList">
        <p style="text-align: center; color: #999;">جاري تحديث المهام...</p>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDFpWeQWHeLnNIC-81UNEEVz_LCa8NMWIc",
        authDomain: "royal-gas.firebaseapp.com",
        projectId: "royal-gas",
        storageBucket: "royal-gas.firebasestorage.app",
        messagingSenderId: "1091464548493",
        appId: "1:1091464548493:web:c2b24978817839da7cd2c4",
        measurementId: "G-PYGR6WDD95"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const IMGBB_API_KEY = "621693c6848341977008ebc613225c19";

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('techEmail').innerText = "فني: " + user.email;
            const q = query(collection(db, "tasks"), where("techEmail", "==", user.email));
            
            onSnapshot(q, (snapshot) => {
                let html = "";
                let pendingNum = 0;
                let doneNum = 0;

                snapshot.forEach((snapshotDoc) => {
                    const t = snapshotDoc.data();
                    const id = snapshotDoc.id;

                    if (t.status === "تمت الزيارة" || t.status === "ملغاة") {
                        doneNum++;
                    } else {
                        pendingNum++;
                        html += `
                            <div class="task-card">
                                <b class="client-name">👤 ${t.clientName}</b>
                                <div class="info-item"><b>📍 العنوان:</b> <span>${t.address}</span></div>
                                <div class="info-item"><b>📞 تليفون:</b> <span>${t.phone}</span></div>
                                <div class="info-item"><b>💬 الشكوى:</b> <span>${t.complaint}</span></div>
                                <div class="info-item"><b>📅 الموعد:</b> <span id="dateText_${id}">${t.date}</span></div>

                                <div class="actions-area">
                                    <a href="tel:${t.phone}" class="btn btn-call">اتصال بالعميل 📞</a>
                                    
                                    <label for="file_${id}" class="btn btn-upload" id="label_${id}">📸 تصوير الفاتورة وإغلاق</label>
                                    <input type="file" id="file_${id}" class="upload-input" accept="image/*" onchange="window.handleUpload('${id}')">
                                    <div id="loader_${id}" class="loader">جاري الرفع... ⏳</div>
                                    
                                    <button onclick="window.finishTask('${id}')" class="btn btn-done" id="btnDone_${id}" style="display:none;">تأكيد الإغلاق النهائي ✅</button>

                                    <div style="display: flex; gap: 10px;">
                                        <button onclick="window.toggleDelayBox('${id}')" class="btn btn-delay">تأجيل ⏳</button>
                                        <button onclick="window.cancelTask('${id}')" class="btn btn-cancel">إلغاء ❌</button>
                                    </div>

                                    <div id="delayBox_${id}" class="delay-box">
                                        <label style="font-size:12px; font-weight:bold;">اختر التاريخ الجديد:</label>
                                        <input type="date" id="newDate_${id}">
                                        <button onclick="window.confirmDelay('${id}')" class="btn btn-done">تأكيد التأجيل</button>
                                    </div>

                                    <p class="gps-notice" id="gps_${id}">سيتم تسجيل الموقع تلقائياً عند الإغلاق</p>
                                </div>
                            </div>`;
                    }
                });

                document.getElementById('pendingCount').innerText = pendingNum;
                document.getElementById('doneCount').innerText = doneNum;
                if (pendingNum === 0) html = "<div style='text-align:center; margin-top:40px; color:#888;'>✨ لا توجد مهام متبقية.</div>";
                document.getElementById('tasksList').innerHTML = html;
            });
        } else {
            window.location.href = "index.html";
        }
    });

    // --- وظائف التحكم الجديدة ---

    // 1. إظهار/إخفاء صندوق التأجيل
    window.toggleDelayBox = (id) => {
        const box = document.getElementById(`delayBox_${id}`);
        box.style.display = box.style.display === "block" ? "none" : "block";
    };

    // 2. تأكيد التأجيل
    window.confirmDelay = async (id) => {
        const newDate = document.getElementById(`newDate_${id}`).value;
        if(!newDate) return alert("من فضلك اختر التاريخ الجديد");
        
        try {
            await updateDoc(doc(db, "tasks", id), {
                status: "مؤجلة",
                date: newDate,
                note: "تم التأجيل بواسطة الفني"
            });
            alert("تم تأجيل الزيارة للموعد الجديد 🗓️");
        } catch (e) {
            alert("حدث خطأ");
        }
    };

    // 3. إلغاء الزيارة
    window.cancelTask = async (id) => {
        if (confirm("هل أنت متأكد من إلغاء هذه الزيارة؟ (بناءً على طلب العميل)")) {
            try {
                await updateDoc(doc(db, "tasks", id), {
                    status: "ملغاة",
                    finishTime: new Date().toLocaleString()
                });
                alert("تم إلغاء الزيارة");
            } catch (e) {
                alert("حدث خطأ");
            }
        }
    };

    // --- الوظائف القديمة (الرفع والإغلاق) ---
    
    document.getElementById('logoutBtn').addEventListener('click', () => {
        signOut(auth).then(() => window.location.href = "index.html");
    });

    window.handleUpload = async (taskId) => {
        const fileInput = document.getElementById(`file_${taskId}`);
        const loader = document.getElementById(`loader_${taskId}`);
        const label = document.getElementById(`label_${taskId}`);
        const doneBtn = document.getElementById(`btnDone_${taskId}`);
        if (!fileInput.files[0]) return;
        loader.style.display = "block";
        label.style.display = "none";
        const formData = new FormData();
        formData.append('image', fileInput.files[0]);
        try {
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
            const result = await response.json();
            if (result.success) {
                doneBtn.setAttribute('data-url', result.data.url);
                doneBtn.style.display = "flex";
                loader.innerHTML = "✅ الفاتورة جاهزة";
                loader.style.color = "var(--success)";
            }
        } catch (e) {
            alert("خطأ في الرفع");
            label.style.display = "flex";
            loader.style.display = "none";
        }
    };

    window.finishTask = async (taskId) => {
        const doneBtn = document.getElementById(`btnDone_${taskId}`);
        const imageUrl = doneBtn.getAttribute('data-url');
        const gpsStatus = document.getElementById(`gps_${taskId}`);
        gpsStatus.innerText = "📍 جاري تحديد موقعك...";
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (position) => {
                try {
                    await updateDoc(doc(db, "tasks", taskId), {
                        status: "تمت الزيارة",
                        billPhoto: imageUrl,
                        finishTime: new Date().toLocaleString(),
                        location: { lat: position.coords.latitude, lng: position.coords.longitude }
                    });
                    alert("تم إغلاق البلاغ بنجاح ✅");
                } catch (e) { alert("خطأ: " + e.message); }
            }, (error) => { alert("يرجى تفعيل الـ GPS"); }, { enableHighAccuracy: true });
        }
    };
</script>
</body>
</html>
