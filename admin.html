<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Gas - Admin Panel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root { --r-blue: #0b4a99; --r-red: #ce2029; --bg: #f8f9fa; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { margin: 0; background: var(--bg); display: flex; }

        /* القائمة الجانبية */
        .sidebar { width: 260px; height: 100vh; background: var(--r-blue); color: white; padding: 20px; position: fixed; }
        .sidebar h2 { font-size: 22px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        .nav-link { display: block; color: white; text-decoration: none; padding: 15px; border-radius: 10px; margin-bottom: 10px; transition: 0.3s; }
        .nav-link:hover { background: rgba(255,255,255,0.1); transform: translateX(-5px); }

        /* المحتوى الرئيسي */
        .main-content { margin-right: 260px; padding: 40px; width: 100%; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* الكروت الإحصائية */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .stat-card { background: white; padding: 25px; border-radius: 20px; border: 1px solid #eee; transition: 0.4s; }
        .stat-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .stat-card h3 { color: #888; font-size: 14px; margin: 0; }
        .stat-card p { font-size: 32px; font-weight: 900; color: var(--r-blue); margin: 10px 0 0 0; }

        /* قسم الإجراءات */
        .action-section { background: white; margin-top: 30px; padding: 30px; border-radius: 20px; border: 1px solid #eee; }
        .btn-add { background: var(--r-blue); color: white; border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: right; color: #888; padding: 15px; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>ROYAL GAS</h2>
        <nav>
            <a href="#" class="nav-link">لوحة الإحصائيات</a>
            <a href="#" class="nav-link">إدارة الفنيين</a>
            <a href="#" class="nav-link">طلبات الصيانة</a>
            <a href="#" class="nav-link" style="margin-top: 50px; background: var(--r-red);">تسجيل خروج</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="header">
            <h1 style="color: var(--r-blue); font-weight: 900;">لوحة المدير العام</h1>
            <button class="btn-add">إضافة فني جديد +</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h3>إجمالي الفنيين</h3><p>12</p></div>
            <div class="stat-card"><h3>عمليات اليوم</h3><p>45</p></div>
            <div class="stat-card"><h3>أعطال معلقة</h3><p style="color: var(--r-red);">7</p></div>
        </div>

        <div class="action-section">
            <h2 style="font-size: 18px; margin-bottom: 20px;">قائمة الفنيين النشطين</h2>
            <table>
                <thead>
                    <tr>
                        <th>اسم الفني</th>
                        <th>البريد الإلكتروني</th>
                        <th>الحالة</th>
                        <th>الإجراء</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>أحمد محمد</td>
                        <td>ahmed@royalgas.com</td>
                        <td style="color: green;">نشط الآن</td>
                        <td><button style="color: var(--r-red); background:none; border:none; cursor:pointer;">حذف</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
