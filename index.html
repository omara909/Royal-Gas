<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Gas - Professional System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap');
        :root { --r-blue: #0b4a99; --r-red: #ce2029; --r-lightblue: #add8e6; }
        * { box-sizing: border-box; }
        body { margin: 0; background: #fff; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }

        /* --- 1. الافتتاحية الأصلية (مثبتة) --- */
        #splash { position: fixed; inset: 0; background: #fff; display: flex; justify-content: center; align-items: center; z-index: 10000; transition: 0.8s; }
        .logo-frame { display: flex; flex-direction: column; align-items: center; width: 450px; text-align: center; }
        .top-part { transform: translateY(-500px); opacity: 0; animation: dropIn 1.2s forwards; }
        .crown-icon { width: 70px; height: 50px; background: var(--r-red); clip-path: polygon(0% 100%, 0% 20%, 25% 50%, 50% 0%, 75% 50%, 100% 20%, 100% 100%); margin-bottom: 10px; }
        .arch-line { width: 100%; height: 6px; background: var(--r-red); border-radius: 50% 50% 0 0 / 100% 100% 0 0; transform: translateX(-600px); opacity: 0; animation: slideLeft 1s 0.3s forwards; }
        .arch-line-inv { width: 100%; height: 6px; background: var(--r-red); border-radius: 0 0 50% 50% / 0 0 100% 100%; transform: translateX(600px); opacity: 0; animation: slideRight 1s 0.3s forwards; }
        .text-section { margin: 25px 0; opacity: 0; transform: scale(0); animation: zoomCenter 0.8s 1s forwards; }
        .main-title { color: var(--r-blue); font-size: 85px; font-weight: 900; line-height: 0.8; margin: 0; letter-spacing: 5px; font-family: 'Times New Roman', serif; }
        .sub-title { color: var(--r-blue); font-size: 35px; font-weight: bold; margin-top: 10px; letter-spacing: 15px; text-indent: 15px; font-family: 'Times New Roman', serif; }

        @keyframes dropIn { to { transform: translateY(0); opacity: 1; } }
        @keyframes slideLeft { to { transform: translateX(0); opacity: 1; } }
        @keyframes slideRight { to { transform: translateX(0); opacity: 1; } }
        @keyframes zoomCenter { to { transform: scale(1); opacity: 1; } }

        /* --- 2. واجهة تسجيل الدخول (التعديلات المطلوبة) --- */
        #authScreen { display: none; width: 100%; height: 100vh; background: #ffffff; flex-direction: column; justify-content: center; align-items: center; opacity: 0; transition: 1s; }
        
        .login-card { 
            background: #ffffff; padding: 40px; border-radius: 25px; width: 90%; max-width: 400px; 
            text-align: center; 
            /* إطار لبني لتمييز الكارت عن الخلفية */
            border: 2px solid var(--r-lightblue); 
            transition: 0.4s ease;
            display: flex; flex-direction: column; align-items: center;
        }

        .login-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 30px 60px rgba(11, 74, 153, 0.15);
            border-color: var(--r-blue);
        }

        .card-logo-wrapper { transform: scale(0.4); margin: -60px 0 -20px 0; display: flex; justify-content: center; width: 100%; }

        /* نصوص باللون الأزرق */
        .login-header { color: var(--r-blue); font-family: 'Cairo', sans-serif; font-size: 26px; font-weight: 900; margin-bottom: 30px; }

        .input-group { text-align: right; margin-bottom: 20px; width: 100%; }
        .input-label { color: var(--r-blue); font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 8px; display: block; }
        
        .input-field { 
            width: 100%; padding: 16px; border-radius: 12px; border: 2px solid #f5f5f5;
            background: #fafafa; color: #000; font-size: 16px; outline: none; transition: 0.3s;
            text-align: right; font-family: 'Cairo', sans-serif;
        }
        .input-field:focus { border-color: var(--r-blue); background: #fff; }
        
        .login-btn { 
            width: 100%; padding: 18px; border-radius: 12px; border: none; 
            background: var(--r-blue); color: white; font-family: 'Cairo', sans-serif; 
            font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.3s;
        }
        .login-btn:hover { background: #083a7a; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-frame">
            <div class="top-part"><div class="crown-icon"></div></div>
            <div class="arch-line"></div>
            <div class="text-section">
                <h1 class="main-title">ROYAL</h1>
                <div class="sub-title">GAS</div>
            </div>
            <div class="arch-line-inv"></div>
        </div>
    </div>

    <div id="authScreen">
        <div class="login-card">
            <div class="card-logo-wrapper">
                <div class="logo-frame">
                    <div class="crown-icon"></div>
                    <div class="arch-line"></div>
                    <h1 class="main-title">ROYAL</h1>
                    <div class="sub-title">GAS</div>
                    <div class="arch-line-inv"></div>
                </div>
            </div>

            <h2 class="login-header">تسجيل الدخول</h2>

            <div class="input-group">
                <label class="input-label">البريد الإلكتروني</label>
                <input type="email" class="input-field" placeholder="example@royalgas.com">
            </div>

            <div class="input-group">
                <label class="input-label">كلمة المرور</label>
                <input type="password" class="input-field" placeholder="••••••••">
            </div>

            <button class="login-btn">دخول النظام</button>
        </div>
    </div>

    <script>
        window.onload = () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    const auth = document.getElementById('authScreen');
                    auth.style.display = 'flex';
                    setTimeout(() => auth.style.opacity = '1', 50);
                }, 800);
            }, 5000);
        };
    </script>
</body>
</html>
